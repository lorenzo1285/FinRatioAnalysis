name: Run Tests

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[mcp]"
        pip install pytest pytest-cov pytest-mock jsonschema
    
    - name: Run library unit tests (skip integration)
      run: |
        pytest tests/ -v --ignore=tests/test_integration_real_data.py
    
    - name: Run MCP server tests
      run: |
        pytest tests_mcp/ -v --ignore=tests_mcp/test_checkpoint.py
    
    - name: Run integration tests (only on Python 3.13 Ubuntu)
      if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
      run: |
        pytest tests/test_integration_real_data.py -v -m integration
        pytest tests_mcp/test_checkpoint.py -v -m integration
